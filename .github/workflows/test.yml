name: Tests

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  PHP_VERSION: "8.4.6"

jobs:
  test:
    name: cargo test (PHP 8.4 ${{ matrix.mode == 'zts' && 'ZTS' || 'NTS' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [nts, zts]

    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest already has: autoconf, automake, bison, make, pkg-config,
      # curl, ca-certificates, libsqlite3-dev, libssl-dev, Rust, Cargo, Rustfmt
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            re2c \
            libxml2-dev zlib1g-dev \
            libcurl4-openssl-dev libpng-dev libonig-dev libzip-dev \
            libicu-dev libsodium-dev libgmp-dev libffi-dev \
            libjpeg-dev libwebp-dev libfreetype-dev \
            libc++-dev libc++abi-dev

      - name: Cache PHP embed build
        id: cache-php
        uses: actions/cache@v4
        with:
          path: /opt/php-embed-${{ matrix.mode }}
          key: php-embed-${{ env.PHP_VERSION }}-${{ matrix.mode }}-${{ runner.os }}-${{ hashFiles('crates/turbine-php-sys/build.rs') }}

      - name: Build PHP embed SAPI (${{ matrix.mode }})
        if: steps.cache-php.outputs.cache-hit != 'true'
        env:
          MODE: ${{ matrix.mode }}
        run: |
          curl -fSL "https://www.php.net/distributions/php-${PHP_VERSION}.tar.xz" -o php.tar.xz
          tar xf php.tar.xz
          cd php-${PHP_VERSION}

          ZTS_FLAG=""
          if [[ "$MODE" == "zts" ]]; then
            ZTS_FLAG="--enable-zts"
          fi

          ./configure \
            --prefix=/opt/php-embed-${MODE} \
            --enable-embed=shared \
            --enable-opcache \
            --enable-mbstring \
            --enable-intl \
            --enable-bcmath \
            --enable-sockets \
            --enable-pcntl \
            ${ZTS_FLAG} \
            --with-openssl \
            --with-zlib \
            --with-curl \
            --with-pdo-mysql=mysqlnd \
            --with-mysqli=mysqlnd \
            --with-pdo-sqlite \
            --with-sqlite3 \
            --with-zip \
            --with-libxml \
            --with-sodium \
            --with-gmp \
            --with-ffi \
            --with-config-file-path=/opt/php-embed-${MODE}/etc \
            --disable-cgi \
            --disable-phpdbg
          make -j"$(nproc)"
          sudo make install

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: cargo-${{ runner.os }}-${{ matrix.mode }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.mode }}-

      - name: Run tests
        env:
          PHP_CONFIG: /opt/php-embed-${{ matrix.mode }}/bin/php-config
          LD_LIBRARY_PATH: /opt/php-embed-${{ matrix.mode }}/lib
        run: cargo test --workspace --verbose

      # Formatting doesn't depend on PHP build — run once on NTS.
      - name: Check formatting
        if: matrix.mode == 'nts'
        run: cargo fmt --all -- --check

      - name: Clippy
        env:
          PHP_CONFIG: /opt/php-embed-${{ matrix.mode }}/bin/php-config
          LD_LIBRARY_PATH: /opt/php-embed-${{ matrix.mode }}/lib
        run: cargo clippy --workspace -- -D warnings
