name: Docker Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.2.0)"
        required: true
        type: string

# Required secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token (Settings → Security → Access Tokens)

env:
  REGISTRY: docker.io
  IMAGE_NAME: katisuhara/turbine-php

jobs:
  build-and-push:
    name: >
      Build ${{ matrix.php_version }}
      ${{ matrix.zts == '1' && 'ZTS' || 'NTS' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write      # required for OIDC token (provenance signing)
      attestations: write  # required to push attestation to registry

    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: "8.4.6"
            php_major: "8.4"
            zts: "0"
            thread_safety: "nts"
            phalcon_version: "5.11.1"
            phpredis_version: "6.3.0"

          - php_version: "8.4.6"
            php_major: "8.4"
            zts: "1"
            thread_safety: "zts"
            phalcon_version: "5.11.1"
            phpredis_version: "6.3.0"

          - php_version: "8.5.1"
            php_major: "8.5"
            zts: "0"
            thread_safety: "nts"
            phalcon_version: "5.11.1"
            phpredis_version: "6.3.0"

          - php_version: "8.5.1"
            php_major: "8.5"
            zts: "1"
            thread_safety: "zts"
            phalcon_version: "5.11.1"
            phpredis_version: "6.3.0"

    steps:
      - uses: actions/checkout@v4

      # Strip leading 'v' from tag (v0.2.0 → 0.2.0)
      # When triggered manually, use the input tag; otherwise use the release tag
      - name: Extract Turbine version
        id: version
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag strategy:
      #   {version}-php{major}-{nts|zts}   e.g. 0.2.0-php8.4-nts
      #   latest-php{major}-{nts|zts}      e.g. latest-php8.4-nts
      #   latest (only for 8.4-nts — the default variant)
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            PHP_VERSION=${{ matrix.php_version }}
            ZTS=${{ matrix.zts }}
            PHALCON_VERSION=${{ matrix.phalcon_version }}
            PHPREDIS_VERSION=${{ matrix.phpredis_version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-php${{ matrix.php_major }}-${{ matrix.thread_safety }}
            ${{ env.IMAGE_NAME }}:latest-php${{ matrix.php_major }}-${{ matrix.thread_safety }}
            ${{ matrix.php_major == '8.4' && matrix.thread_safety == 'nts' && format('{0}:latest', env.IMAGE_NAME) || '' }}
          cache-from: type=gha,scope=php${{ matrix.php_major }}-${{ matrix.thread_safety }}
          cache-to: type=gha,mode=max,scope=php${{ matrix.php_major }}-${{ matrix.thread_safety }}
          labels: |
            org.opencontainers.image.title=Turbine
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            turbine.php.version=${{ matrix.php_version }}
            turbine.php.thread-safety=${{ matrix.thread_safety }}

      # Sign and attach SLSA build provenance attestation to the image
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
