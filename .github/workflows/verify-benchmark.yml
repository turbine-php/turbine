name: Verify Benchmark Integrity

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: "PHP major version (e.g. 8.4). Both NTS and ZTS images will be tested."
        required: false
        default: "8.4"
      connections:
        description: "Number of concurrent connections for wrk."
        required: false
        default: "256"
      duration:
        description: "Benchmark duration in seconds per test."
        required: false
        default: "10"
      samples:
        description: "Number of curl samples for Phase 1 uniqueness check."
        required: false
        default: "500"
      workers:
        description: "Number of workers/threads per server."
        required: false
        default: "4"

# Required secrets:
#   HETZNER_API_TOKEN — Hetzner Cloud API token (Project → API Tokens → Read+Write)

permissions:
  contents: read

jobs:
  verify:
    name: Verify on Hetzner CCX33
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Parse inputs
        id: meta
        run: |
          echo "php_version=${{ inputs.php_version || '8.4' }}" >> "$GITHUB_OUTPUT"
          echo "connections=${{ inputs.connections || '256' }}"  >> "$GITHUB_OUTPUT"
          echo "duration=${{ inputs.duration || '10' }}"        >> "$GITHUB_OUTPUT"
          echo "samples=${{ inputs.samples || '500' }}"         >> "$GITHUB_OUTPUT"
          echo "workers=${{ inputs.workers || '4' }}"           >> "$GITHUB_OUTPUT"

      - name: Generate SSH keypair
        run: ssh-keygen -t ed25519 -f /tmp/bench_key -N ""

      - name: Create Hetzner SSH key
        id: hkey
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          KEY_NAME="verify-${{ github.run_id }}-${{ github.run_attempt }}"
          RESP=$(curl -sSL -X POST \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${KEY_NAME}\",\"public_key\":\"$(cat /tmp/bench_key.pub)\"}" \
            https://api.hetzner.cloud/v1/ssh_keys)
          ERR_CODE=$(echo "$RESP" | jq -r '.error.code // empty')
          if [[ -n "$ERR_CODE" ]]; then
            echo "::error::Hetzner SSH key error: $(echo "$RESP" | jq -r '.error.message')"
            exit 1
          fi
          KEY_ID=$(echo "$RESP" | jq -r '.ssh_key.id')
          echo "id=${KEY_ID}" >> "$GITHUB_OUTPUT"
          echo "KEY_ID=${KEY_ID}" >> "$GITHUB_ENV"

      - name: Create Hetzner CCX33 server
        id: server
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          RESP=$(curl -sSL -X POST \
            -H "Authorization: Bearer $HCLOUD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"verify-${{ github.run_id }}-${{ github.run_attempt }}\",\"server_type\":\"ccx33\",\"image\":\"ubuntu-24.04\",\"ssh_keys\":[${{ steps.hkey.outputs.id }}],\"location\":\"nbg1\"}" \
            https://api.hetzner.cloud/v1/servers)
          ERR=$(echo "$RESP" | jq -r '.error.message // empty')
          if [[ -n "$ERR" ]]; then
            echo "::error::Hetzner API error: $ERR"
            exit 1
          fi
          echo "id=$(echo "$RESP"   | jq -r '.server.id')"                  >> "$GITHUB_OUTPUT"
          echo "ip=$(echo "$RESP"   | jq -r '.server.public_net.ipv4.ip')"  >> "$GITHUB_OUTPUT"
          echo "SERVER_ID=$(echo "$RESP" | jq -r '.server.id')" >> "$GITHUB_ENV"

      - name: Wait for SSH availability
        run: |
          IP="${{ steps.server.outputs.ip }}"
          echo "Waiting for SSH on ${IP}..."
          for i in $(seq 1 40); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                -i /tmp/bench_key "root@${IP}" "echo ready" 2>/dev/null && break
            echo "  Attempt ${i}/40 — retrying in 10s..."
            sleep 10
          done

      - name: Upload scripts
        run: |
          scp -o StrictHostKeyChecking=no -i /tmp/bench_key -r \
            benchmarks/scripts "root@${{ steps.server.outputs.ip }}:/root/bench"

      - name: Install Docker and wrk
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/bench_key \
            "root@${{ steps.server.outputs.ip }}" bash -s << 'SETUP'
          set -euo pipefail
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              ca-certificates curl gnupg python3
          curl -fsSL https://get.docker.com | sh
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              wrk || {
              apt-get install -y --no-install-recommends libssl-dev build-essential git
              git clone --depth 1 https://github.com/wg/wrk.git /tmp/wrk-src
              make -C /tmp/wrk-src -j$(nproc)
              cp /tmp/wrk-src/wrk /usr/local/bin/wrk
          }
          echo "[setup] Docker $(docker --version) · wrk $(wrk --version 2>&1 | head -1)"
          SETUP

      - name: Pull Docker images
        run: |
          PHP="${{ steps.meta.outputs.php_version }}"
          ssh -o StrictHostKeyChecking=no -i /tmp/bench_key \
            "root@${{ steps.server.outputs.ip }}" bash -s << PULL
          set -euo pipefail
          docker pull "katisuhara/turbine-php:latest-php${PHP}-nts"
          docker pull "katisuhara/turbine-php:latest-php${PHP}-zts"
          docker pull "dunglas/frankenphp:latest"
          echo "[setup] Images pulled"
          PULL

      - name: Run verification benchmark
        id: verify
        run: |
          PHP="${{ steps.meta.outputs.php_version }}"
          CONN="${{ steps.meta.outputs.connections }}"
          DUR="${{ steps.meta.outputs.duration }}"
          SAMPLES="${{ steps.meta.outputs.samples }}"
          WORKERS="${{ steps.meta.outputs.workers }}"
          IP="${{ steps.server.outputs.ip }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i /tmp/bench_key"

          # Run the verification script on the remote server
          # Results are written to /tmp/verify-results.json on the remote machine
          ssh ${SSH_OPTS} "root@${IP}" \
            bash /root/bench/run-verify-hetzner.sh \
            "${CONN}" "${DUR}" "${SAMPLES}" "${WORKERS}" "${PHP}" \
            2>&1 | tee /tmp/verify-log.txt || true

          # Retrieve results file from remote (the script writes it to /tmp/verify-results.json)
          scp ${SSH_OPTS} "root@${IP}:/tmp/verify-results.json" /tmp/verify-results.json 2>/dev/null || true

          if [[ ! -s /tmp/verify-results.json ]]; then
            echo "::error::Failed to retrieve verify-results.json from remote server"
            echo "--- Verify log ---"
            cat /tmp/verify-log.txt || true
            exit 1
          fi

          echo "--- Results retrieved: $(wc -c < /tmp/verify-results.json) bytes ---"

      - name: Generate summary
        if: always() && steps.verify.outcome != 'skipped'
        run: |
          python3 - /tmp/verify-results.json "$GITHUB_STEP_SUMMARY" << 'PYEOF'
          import json, sys, os

          summary_file = sys.argv[2] if len(sys.argv) > 2 else None
          lines = []
          def out(s=""):
              print(s)
              lines.append(s)

          try:
              data = json.load(open(sys.argv[1]))
          except Exception as e:
              out(f"::error::Failed to parse results: {e}")
              # Try to dump raw content for debugging
              try:
                  raw = open(sys.argv[1]).read()[:2000]
                  out(f"\nRaw results file content:\n```\n{raw}\n```")
              except:
                  pass
              if summary_file:
                  with open(summary_file, "a") as f:
                      f.write("\n".join(lines))
              sys.exit(1)

          meta = data[0]["meta"]
          results = data[0]["results"]

          out("## Verification Benchmark Results\n")
          out("| | |")
          out("|---|---|")
          out(f"| **PHP** | {meta['php_version']} |")
          out(f"| **Server** | Hetzner CCX33 (8 vCPU / 32 GB) |")
          out(f"| **Connections** | {meta['connections']} |")
          out(f"| **Duration** | {meta['duration']}s |")
          out(f"| **Samples** | {meta['samples']} |")
          out(f"| **Workers** | {meta['workers']} |")
          out()

          total_pass = 0
          total_fail = 0
          diagnostics = []

          for variant in results:
              label = variant.get("label", "?")
              tests = variant.get("tests", [])
              out(f"### {label}\n")
              out("| Test | Req/s | p50 | p99 | Samples | Unique | Dups | Hashes | Phase 1 |")
              out("|------|------:|----:|----:|--------:|-------:|-----:|-------:|:-------:|")
              for t in tests:
                  w = t.get("wrk", {})
                  rps = w.get("rps", 0)
                  p50 = w.get("latency_p50_ms", 0)
                  p99 = w.get("latency_p99_ms", 0)
                  samples = t.get("samples", 0)
                  unique = t.get("unique_bodies", 0)
                  dups = t.get("duplicates", 0)
                  hinv = t.get("hash_invalid", 0)
                  passed = t.get("phase1_pass", False)
                  icon = "✅" if passed else "❌"
                  if passed:
                      total_pass += 1
                  else:
                      total_fail += 1
                  out(f"| {t['script']} | {rps:,} | {p50:.1f} ms | {p99:.1f} ms | {samples} | {unique} | {dups} | {hinv} | {icon} |")
              out()

          out(f"---\n**Total: {total_pass} passed, {total_fail} failed**\n")
          out("*Check the `Run verification benchmark` step logs for detailed sample responses and hash error diagnostics.*\n")

          if summary_file:
              with open(summary_file, "a") as f:
                  f.write("\n".join(lines))

          if total_fail > 0:
              print("::error::Some verification tests failed!")
              sys.exit(1)
          else:
              print("All verification tests passed — every response is unique, no caching detected.")
          PYEOF

      - name: Delete Hetzner server and SSH key
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          if [[ -n "${SERVER_ID:-}" ]]; then
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/${SERVER_ID}" || true
          fi
          if [[ -n "${KEY_ID:-}" ]]; then
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/ssh_keys/${KEY_ID}" || true
          fi
