# Turbine — WordPress Production Configuration
# Locked-down settings for a production WordPress site

[server]
workers = 0
listen = "0.0.0.0:8080"
worker_mode = "process"
request_timeout = 60
worker_max_requests = 3000
auto_scale = true
min_workers = 2
max_workers = 16
scale_down_idle_secs = 10

[server.tls]
enabled = true
cert_file = "/etc/ssl/certs/app.pem"
key_file = "/etc/ssl/private/app.key"

[php]
extensions = ["mysqli.so"]
memory_limit = "512M"
max_execution_time = 60
upload_max_filesize = "32M"
post_max_size = "32M"
opcache_memory = 256
jit_buffer_size = "128M"

[php.ini]
error_reporting = "E_ALL & ~E_DEPRECATED & ~E_STRICT"
display_errors = "0"
log_errors = "1"
date.timezone = "UTC"
"short_open_tag" = "1"
"max_input_vars" = "5000"

[security]
enabled = true
sql_guard = true
code_injection_guard = true
path_traversal_guard = true
behaviour_guard = true
max_requests_per_second = 100
rate_limit_window = 60

[sandbox]
execution_mode = "framework"
data_directories = ["wp-content/uploads/"]
blocked_upload_extensions = [".php", ".phtml", ".phar", ".php7", ".php8", ".inc", ".phps", ".pht", ".pgif"]
scan_upload_content = true
disabled_functions = ["pcntl_exec", "dl"]
enforce_open_basedir = true
block_url_include = true
block_url_fopen = false

[cache]
enabled = true
ttl_seconds = 60
max_entries = 4096

[logging]
level = "warn"

[compression]
enabled = true
min_size = 1024
level = 6
algorithms = ["br", "zstd", "gzip"]

[session]
enabled = true
save_path = "/tmp/turbine-sessions"
cookie_name = "PHPSESSID"
cookie_lifetime = 0
cookie_httponly = true
cookie_secure = true
cookie_samesite = "Lax"
gc_maxlifetime = 1440

[watcher]
enabled = false

[dashboard]
enabled = true
statistics = true
token = "change-me-in-production"

# Separate pool for wp-admin to avoid starving the frontend
[[worker_pools]]
match_path = "/wp-admin/*"
min_workers = 1
max_workers = 4
name = "wp-admin"

[[worker_pools]]
match_path = "/wp-json/*"
min_workers = 1
max_workers = 4
name = "rest-api"
