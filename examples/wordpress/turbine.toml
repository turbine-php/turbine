# Turbine — WordPress Configuration
# Settings tuned for WordPress's requirements

[server]
workers = 0
listen = "127.0.0.1:8080"
worker_mode = "process"
request_timeout = 60
worker_max_requests = 5000
auto_scale = false

[server.tls]
enabled = false

[php]
extensions = ["mysqli.so"]
# zend_extensions = []
memory_limit = "256M"
max_execution_time = 60
upload_max_filesize = "64M"
post_max_size = "64M"
opcache_memory = 128
jit_buffer_size = "64M"
upload_tmp_dir = "/tmp/turbine-uploads"

[php.ini]
error_reporting = "E_ALL & ~E_DEPRECATED & ~E_STRICT"
display_errors = "0"
date.timezone = "UTC"
# WordPress needs these
"short_open_tag" = "1"
"max_input_vars" = "5000"

[security]
enabled = true
sql_guard = true
code_injection_guard = true
path_traversal_guard = true
# WordPress Gutenberg generates 100+ concurrent requests on page load.
# Set high limit or disable during development.
behaviour_guard = true
max_requests_per_second = 2000
rate_limit_window = 60

[sandbox]
execution_mode = "framework"
# Protect uploads directory from PHP execution (prevents shell uploads)
data_directories = ["wp-content/uploads/"]
blocked_upload_extensions = [".php", ".phtml", ".phar", ".php7", ".php8", ".inc", ".phps", ".pht", ".pgif"]
scan_upload_content = true
# WordPress needs more functions than typical apps
disabled_functions = ["pcntl_exec", "dl"]
enforce_open_basedir = true
block_url_include = true
# WordPress needs url_fopen for updates, HTTP API, etc.
block_url_fopen = false

[cache]
# WordPress has its own object cache — Turbine cache is for static responses
enabled = true
ttl_seconds = 30
max_entries = 1024

[logging]
level = "info"

[compression]
enabled = true
min_size = 1024
level = 6
algorithms = ["br", "zstd", "gzip"]

[session]
enabled = true
save_path = "/tmp/turbine-sessions"
cookie_name = "PHPSESSID"
cookie_lifetime = 0
cookie_httponly = true
cookie_secure = false
cookie_samesite = "Lax"
gc_maxlifetime = 1440

[cors]
enabled = false

[watcher]
enabled = false
paths = ["wp-content/themes/", "wp-content/plugins/"]
extensions = ["php"]
debounce_ms = 1000

[early_hints]
enabled = false

[dashboard]
enabled = true
statistics = true
# token = "my-secret-token"
