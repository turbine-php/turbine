# Turbine — Symfony Configuration
# Optimized for a typical Symfony application

[server]
workers = 0
listen = "127.0.0.1:8080"
worker_mode = "process"
request_timeout = 30
worker_max_requests = 10000
auto_scale = false

[server.tls]
enabled = false

[php]
# extensions = ["redis.so", "imagick.so"]
memory_limit = "256M"
max_execution_time = 30
upload_max_filesize = "64M"
post_max_size = "64M"
opcache_memory = 128
jit_buffer_size = "64M"
upload_tmp_dir = "/tmp/turbine-uploads"
# Use Symfony's built-in preloader or "auto" for Turbine-generated
# preload_script = "config/preload.php"

[php.ini]
error_reporting = "E_ALL"
"date.timezone" = "UTC"
"realpath_cache_size" = "4096k"
"realpath_cache_ttl" = "600"

[security]
enabled = true
sql_guard = true
code_injection_guard = true
path_traversal_guard = true
behaviour_guard = true
max_requests_per_second = 100
rate_limit_window = 60

[sandbox]
execution_mode = "framework"
data_directories = ["var/", "public/uploads/"]
blocked_upload_extensions = [".php", ".phtml", ".phar", ".php7", ".php8", ".inc", ".phps", ".pht", ".pgif"]
scan_upload_content = true
disabled_functions = ["exec", "system", "passthru", "shell_exec", "popen", "pcntl_exec", "dl", "putenv"]
enforce_open_basedir = true
block_url_include = true
block_url_fopen = false

[cache]
enabled = true
ttl_seconds = 30
max_entries = 2048

[logging]
level = "info"

[compression]
enabled = true
min_size = 1024
level = 6
algorithms = ["br", "zstd", "gzip"]

[session]
enabled = true
save_path = "/tmp/turbine-sessions"
cookie_name = "PHPSESSID"
cookie_lifetime = 0
cookie_httponly = true
cookie_secure = false
cookie_samesite = "Lax"
gc_maxlifetime = 1440

[cors]
# Let Symfony's NelmioCorsBundle handle CORS, or enable here
enabled = false

[watcher]
enabled = false
paths = ["src/", "config/", "templates/"]
extensions = ["php", "yaml", "twig"]
debounce_ms = 500

[early_hints]
enabled = true

[structured_logging]
enabled = true
output = "stderr"

[dashboard]
enabled = true
statistics = true
