# Turbine — Phalcon Configuration
# Optimized for Phalcon PHP framework

[server]
workers = 8
listen = "127.0.0.1:8080"
worker_mode = "process"
persistent_workers = true
worker_boot = "turbine-boot.php"
worker_handler = "turbine-handler.php"
request_timeout = 30
worker_max_requests = 50000
auto_scale = false

[server.tls]
enabled = false

[php]
# PSR must be loaded before Phalcon
extensions = ["psr.so", "phalcon.so"]
memory_limit = "256M"
max_execution_time = 30
upload_max_filesize = "64M"
post_max_size = "64M"
opcache_memory = 128
jit_buffer_size = "64M"
upload_tmp_dir = "/tmp/turbine-uploads"
# preload_script = "auto"

[php.ini]
error_reporting = "E_ALL"
"date.timezone" = "UTC"
"phalcon.orm.cast_on_hydrate" = "1"
"phalcon.orm.cast_last_insert_id_to_int" = "1"

[security]
enabled = false

[sandbox]
execution_mode = "framework"
data_directories = ["cache/", "data/", "public/uploads/"]
blocked_upload_extensions = [".php", ".phtml", ".phar", ".php7", ".php8", ".inc", ".phps", ".pht", ".pgif"]
scan_upload_content = true
disabled_functions = ["exec", "system", "passthru", "shell_exec", "proc_open", "popen", "pcntl_exec", "dl", "putenv"]
enforce_open_basedir = true
block_url_include = true
block_url_fopen = true

[cache]
enabled = true
ttl_seconds = 30
max_entries = 2048

[logging]
level = "info"

[compression]
enabled = true
min_size = 1024
level = 6
algorithms = ["br", "zstd", "gzip"]

[session]
enabled = true
save_path = "/tmp/turbine-sessions"
cookie_name = "PHPSESSID"
cookie_lifetime = 0
cookie_httponly = true
cookie_secure = false
cookie_samesite = "Lax"
gc_maxlifetime = 1440

[cors]
enabled = true
allow_origins = ["*"]
allow_methods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
allow_headers = ["Content-Type", "Authorization", "X-Requested-With"]
max_age = 86400

[watcher]
enabled = false
paths = ["app/", "public/"]
extensions = ["php", "volt"]
debounce_ms = 500

[early_hints]
enabled = true

[structured_logging]
enabled = true
output = "stderr"

[dashboard]
enabled = true
statistics = true
